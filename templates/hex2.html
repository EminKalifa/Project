<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS50 II — Hex to Colour</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="hex2.css" rel="stylesheet">
</head>
<body>

<div id="cursor"><div class="ring"></div><div class="dot"></div></div>
<div class="corner tl">CS50 II / HEX → COLOUR</div>
<div class="corner br" id="diffLbl">DIFFICULTY: EASY</div>

<header>
  <div class="logo">CHROM<span>É II</span></div>
  <div class="hright">
    <div class="hstat s2"><div class="snum" id="streakN">0</div><div class="slbl">Streak 🔥</div></div>
    <div class="hstat"><div class="snum" id="scoreN">0</div><div class="slbl">Score</div></div>
  </div>
</header>

<main>
  <div class="diff-bar">
    <button class="diff-btn active" data-diff="easy" data-hint="Vastly different">Easy</button>
    <button class="diff-btn" data-diff="medium" data-hint="Similar hues">Medium</button>
    <button class="diff-btn" data-diff="hard" data-hint="Nearly identical">Hard</button>
  </div>

  <div id="gameArea" style="display:flex;flex-direction:column;align-items:center;width:100%">
    <div class="prog-wrap">
      <div class="prog-meta"><span id="rndLbl">Round 1 of 10</span><span id="accLbl">Accuracy —</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="round-dots" id="rndDots"></div>

    <div class="hex-card">
      <div class="hex-card-bg"></div>
      <div class="hc-eyebrow">Find the matching colour swatch</div>
      <div class="hc-code" id="hexCode"><span class="hash">#</span>FF5733</div>
      <div class="hc-sub">Which swatch corresponds to this hex code?</div>
    </div>

    <div class="opts" id="optsGrid"></div>
    <div class="feedback"><div class="fb-title" id="fbTitle"></div><div class="fb-sub" id="fbSub"></div></div>
    <button class="next-btn" id="nextBtn">Next hex →</button>
  </div>

  <div class="gameover" id="gameOver">
    <p class="go-eyebrow">Session complete</p>
    <h2 class="go-title" id="goTitle">Colour<br><span>sense.</span></h2>
    <div class="go-div"></div>
    <div class="go-stats">
      <div class="go-stat"><div class="gn" id="goScore">0</div><div class="gl">Score</div></div>
      <div class="go-stat"><div class="gn" id="goCorrect">0/10</div><div class="gl">Correct</div></div>
      <div class="go-stat"><div class="gn" id="goBest">0</div><div class="gl">Best Streak</div></div>
    </div>
    <p class="go-grade" id="goGrade"></p>
    <button class="play-again" id="playAgain">Play again</button>
  </div>
</main>

<script>
  // cursor
  const cur=document.getElementById('cursor');
  const cdot=cur.querySelector('.dot'),cring=cur.querySelector('.ring');
  let mx=-100,my=-100,rx=-100,ry=-100;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cdot.style.left=mx+'px';cdot.style.top=my+'px';});
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cring.style.left=rx+'px';cring.style.top=ry+'px';requestAnimationFrame(loop);})();
  const sh=v=>document.body.classList.toggle('hovering',v);
  document.querySelectorAll('button').forEach(b=>{b.addEventListener('mouseenter',()=>sh(true));b.addEventListener('mouseleave',()=>sh(false));});

  const ROUNDS=10;
  const PTS={easy:100,medium:200,hard:350};
  const VARIANCE={easy:90,medium:32,hard:11};
  let diff='easy',round=0,score=0,streak=0,best=0,history=[],answered=false,correctHex='';

  function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=ri(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
  function randomHex(){const r=ri(0,255),g=ri(0,255),b=ri(0,255);return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`.toUpperCase();}
  function hexToRGB(h){const x=h.replace('#','');return{r:parseInt(x.slice(0,2),16),g:parseInt(x.slice(2,4),16),b:parseInt(x.slice(4,6),16)};}
  function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
  function colorDist(a,b){const ra=hexToRGB(a),rb=hexToRGB(b);return Math.sqrt((ra.r-rb.r)**2+(ra.g-rb.g)**2+(ra.b-rb.b)**2);}
  function varyHex(hex,v){const{r,g,b}=hexToRGB(hex);const nr=clamp(r+ri(-v,v),0,255),ng=clamp(g+ri(-v,v),0,255),nb=clamp(b+ri(-v,v),0,255);return`#${nr.toString(16).padStart(2,'0')}${ng.toString(16).padStart(2,'0')}${nb.toString(16).padStart(2,'0')}`.toUpperCase();}

  function generateOptions(correct){
    const v=VARIANCE[diff];
    const opts=[correct];
    let at=0;
    while(opts.length<5&&at<300){
      at++;
      let c;
      if(diff==='easy'){c=randomHex();if(colorDist(correct,c)<100)continue;}
      else{c=varyHex(correct,v+ri(diff==='medium'?20:5,diff==='medium'?40:15));if(c===correct||opts.includes(c)||colorDist(correct,c)<(diff==='medium'?14:4))continue;}
      if(!opts.includes(c))opts.push(c);
    }
    while(opts.length<5)opts.push(varyHex(correct,60));
    return shuffle(opts);
  }

  function getLum(hex){const{r,g,b}=hexToRGB(hex);return(0.299*r+0.587*g+0.114*b)/255;}

  function updateDots(){
    const c=document.getElementById('rndDots');c.innerHTML='';
    for(let i=0;i<ROUNDS;i++){
      const d=document.createElement('div');d.className='round-dot';
      if(i<round)d.classList.add(history[i]?'ok':'ng');
      else if(i===round)d.classList.add('cur');
      c.appendChild(d);
    }
  }
  function updateProg(){
    document.getElementById('progFill').style.width=(round/ROUNDS*100)+'%';
    document.getElementById('rndLbl').textContent=`Round ${round+1} of ${ROUNDS}`;
    const cor=history.filter(Boolean).length;
    document.getElementById('accLbl').textContent=round>0?`Accuracy ${Math.round(cor/round*100)}%`:'Accuracy —';
  }

  function renderRound(){
    if(round>=ROUNDS){showGameOver();return;}
    answered=false;
    correctHex=randomHex();

    // show hex code
    const codeEl=document.getElementById('hexCode');
    codeEl.style.opacity='0';codeEl.style.transform='scale(0.96)';
    setTimeout(()=>{
      codeEl.innerHTML=`<span class="hash">#</span>${correctHex.slice(1)}`;
      codeEl.style.transition='opacity .4s ease, transform .4s cubic-bezier(.2,.8,.3,1)';
      codeEl.style.opacity='1';codeEl.style.transform='scale(1)';
    },80);

    const opts=generateOptions(correctHex);
    const grid=document.getElementById('optsGrid');
    grid.innerHTML='';
    opts.forEach((hex,i)=>{
      const btn=document.createElement('button');
      btn.className='opt-btn';
      const lum=getLum(hex);
      const overlayChar=hex===correctHex?'✓':'✕';
      btn.innerHTML=`
        <div class="swatch-face" style="background:${hex}">
          <div class="swatch-shine"></div>
          <div class="opt-overlay" style="color:${lum>.55?'rgba(0,0,0,.7)':'rgba(255,255,255,.8)'}">${overlayChar}</div>
        </div>
        <div class="swatch-num">${String.fromCharCode(65+i)}</div>
      `;
      btn.style.animationDelay=(i*0.06)+'s';
      btn.addEventListener('mouseenter',()=>sh(true));
      btn.addEventListener('mouseleave',()=>sh(false));
      btn.addEventListener('click',()=>handleAnswer(btn,hex));
      grid.appendChild(btn);
    });

    document.getElementById('fbTitle').textContent='';
    document.getElementById('fbSub').textContent='';
    document.getElementById('nextBtn').classList.remove('vis');
    updateProg();updateDots();
  }

  function handleAnswer(btn,chosen){
    if(answered)return;
    answered=true;
    document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
    const ok=chosen===correctHex;
    history.push(ok);
    if(ok){
      btn.classList.add('correct');
      const pts=PTS[diff]+(streak*20);
      score+=pts;streak++;if(streak>best)best=streak;
      document.getElementById('fbTitle').textContent=pick(['Exquisite.','Parfait.','Brilliant.','Correct.','Splendid.']);
      document.getElementById('fbTitle').className='fb-title good';
      document.getElementById('fbSub').textContent=`+${pts} pts${streak>1?' · '+streak+'× streak':''}`;
    } else {
      btn.classList.add('wrong');
      streak=0;
      document.querySelectorAll('.opt-btn').forEach(b=>{
        const sf=b.querySelector('.swatch-face');
        if(sf&&sf.style.background.replace(/\s/g,'').toUpperCase().includes(correctHex.slice(1).toUpperCase()))
          b.classList.add('reveal');
      });
      // safer reveal by re-checking
      const allBtns=document.querySelectorAll('.opt-btn');
      allBtns.forEach(b=>{
        const sf=b.querySelector('.swatch-face');
        if(sf){
          // get color from style
          const bg=sf.style.backgroundColor||sf.style.background||'';
          // compare by converting stored hex back
        }
      });
      document.getElementById('fbTitle').textContent=pick(['Not quite.','Almost.','Incorrect.','So close.']);
      document.getElementById('fbTitle').className='fb-title bad';
      document.getElementById('fbSub').textContent=`Correct: ${correctHex}`;
    }
    document.getElementById('scoreN').textContent=score;
    document.getElementById('streakN').textContent=streak;
    round++;
    document.getElementById('nextBtn').classList.add('vis');
    updateDots();
  }

  function pick(a){return a[ri(0,a.length-1)];}

  function showGameOver(){
    document.getElementById('gameArea').style.display='none';
    const go=document.getElementById('gameOver');go.classList.add('show');
    const cor=history.filter(Boolean).length,pct=Math.round(cor/ROUNDS*100);
    document.getElementById('goScore').textContent=score;
    document.getElementById('goCorrect').textContent=`${cor}/${ROUNDS}`;
    document.getElementById('goBest').textContent=best;
    const ts=['Perfect<br><span>spectrum.</span>','Colour<br><span>mastery.</span>','Developing<br><span>eye.</span>','Keep<br><span>practising.</span>','Colour<br><span>blind?</span>'];
    const gs=['"You perceive what others miss. The palette belongs to you."','"A refined eye for colour — design studios await your eye."','"Your colour intuition grows. The spectrum is vast."','"Each hex holds a secret. You\'re learning to read them."','"#000000 — maybe start with black and white."'];
    const idx=pct===100?0:pct>=80?1:pct>=60?2:pct>=40?3:4;
    document.getElementById('goTitle').innerHTML=ts[idx];
    document.getElementById('goGrade').textContent=gs[idx];
  }

  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.addEventListener('mouseenter',()=>sh(true));b.addEventListener('mouseleave',()=>sh(false));
    b.addEventListener('click',()=>{
      document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');diff=b.dataset.diff;
      document.getElementById('diffLbl').textContent='DIFFICULTY: '+diff.toUpperCase();
      if(round===0)renderRound();
    });
  });
  document.getElementById('nextBtn').addEventListener('click',()=>{document.getElementById('nextBtn').classList.remove('vis');renderRound();});
  document.getElementById('playAgain').addEventListener('click',()=>{
    round=0;score=0;streak=0;best=0;history=[];
    document.getElementById('scoreN').textContent=0;document.getElementById('streakN').textContent=0;
    document.getElementById('gameOver').classList.remove('show');
    const ga=document.getElementById('gameArea');ga.style.display='flex';ga.style.flexDirection='column';ga.style.alignItems='center';
    renderRound();
  });

  // Proper reveal: store hex on button dataset
  const _origRender=renderRound;
  // we'll store hex as data attribute instead
  function renderRoundFixed(){
    if(round>=ROUNDS){showGameOver();return;}
    answered=false;
    correctHex=randomHex();
    const codeEl=document.getElementById('hexCode');
    codeEl.style.opacity='0';codeEl.style.transform='scale(0.96)';
    setTimeout(()=>{
      codeEl.innerHTML=`<span class="hash">#</span>${correctHex.slice(1)}`;
      codeEl.style.transition='opacity .4s ease, transform .4s cubic-bezier(.2,.8,.3,1)';
      codeEl.style.opacity='1';codeEl.style.transform='scale(1)';
    },80);
    const opts=generateOptions(correctHex);
    const grid=document.getElementById('optsGrid');
    grid.innerHTML='';
    opts.forEach((hex,i)=>{
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.dataset.hex=hex;
      const lum=getLum(hex);
      btn.innerHTML=`
        <div class="swatch-face" style="background:${hex}">
          <div class="swatch-shine"></div>
          <div class="opt-overlay" style="color:${lum>.55?'rgba(0,0,0,.7)':'rgba(255,255,255,.8)'}"></div>
        </div>
        <div class="swatch-num">${String.fromCharCode(65+i)}</div>
      `;
      btn.addEventListener('mouseenter',()=>sh(true));
      btn.addEventListener('mouseleave',()=>sh(false));
      btn.addEventListener('click',()=>handleAnswerFixed(btn,hex));
      grid.appendChild(btn);
    });
    document.getElementById('fbTitle').textContent='';
    document.getElementById('fbSub').textContent='';
    document.getElementById('nextBtn').classList.remove('vis');
    updateProg();updateDots();
  }

  function handleAnswerFixed(btn,chosen){
    if(answered)return;
    answered=true;
    document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
    const ok=chosen===correctHex;
    history.push(ok);

    // set overlay icons
    document.querySelectorAll('.opt-btn').forEach(b=>{
      const ov=b.querySelector('.opt-overlay');
      const lum=getLum(b.dataset.hex);
      ov.style.color=lum>.55?'rgba(0,0,0,.7)':'rgba(255,255,255,.8)';
      if(b.dataset.hex===correctHex)ov.textContent='✓';
      else ov.textContent='✕';
    });

    if(ok){
      btn.classList.add('correct');
      const pts=PTS[diff]+(streak*20);
      score+=pts;streak++;if(streak>best)best=streak;
      document.getElementById('fbTitle').textContent=pick(['Exquisite.','Parfait.','Brilliant.','Correct.','Splendid.']);
      document.getElementById('fbTitle').className='fb-title good';
      document.getElementById('fbSub').textContent=`+${pts} pts${streak>1?' · '+streak+'× streak':''}`;
    } else {
      btn.classList.add('wrong');streak=0;
      document.querySelectorAll('.opt-btn').forEach(b=>{if(b.dataset.hex===correctHex)b.classList.add('reveal');});
      document.getElementById('fbTitle').textContent=pick(['Not quite.','Almost.','Incorrect.','So close.']);
      document.getElementById('fbTitle').className='fb-title bad';
      document.getElementById('fbSub').textContent=`Correct answer: ${correctHex}`;
    }
    document.getElementById('scoreN').textContent=score;
    document.getElementById('streakN').textContent=streak;
    round++;
    document.getElementById('nextBtn').classList.add('vis');
    updateDots();
  }

  // override renderRound with fixed version
  window.renderRound=renderRoundFixed;
  document.getElementById('nextBtn').onclick=()=>{document.getElementById('nextBtn').classList.remove('vis');renderRoundFixed();};
  document.getElementById('playAgain').onclick=()=>{
    round=0;score=0;streak=0;best=0;history=[];
    document.getElementById('scoreN').textContent=0;document.getElementById('streakN').textContent=0;
    document.getElementById('gameOver').classList.remove('show');
    const ga=document.getElementById('gameArea');ga.style.display='flex';ga.style.flexDirection='column';ga.style.alignItems='center';
    renderRoundFixed();
  };

  renderRoundFixed();
</script>
</body>
</html>
