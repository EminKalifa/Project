<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CS50 — Hex Colour Game</title>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --ink: #0a0a0f;
                --gold: #c9a84c;
                --gold-light: #e8c97a;
                --cream: #ede8de;
                --muted: #5a5550;
                --dim: #1a1a22;
                --border: rgba(201, 168, 76, 0.15);
            }

            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--ink);
                color: var(--cream);
                font-family: 'Cormorant Garamond', Georgia, serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                overflow-x: hidden;
                cursor: none;
            }

            /* ── GRAIN ── */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                z-index: 9998;
                pointer-events: none;
                opacity: 0.04;
                background-size: 200px 200px;
            }

            /* ── CURSOR ── */
            #cursor {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 9999;
                pointer-events: none;
            }

            #cursor .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--gold);
                position: absolute;
                transform: translate(-50%, -50%);
                transition: transform 0.1s;
            }

            #cursor .ring {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 1px solid rgba(201, 168, 76, 0.5);
                position: absolute;
                transform: translate(-50%, -50%);
                transition: width 0.3s, height 0.3s, border-color 0.3s;
            }

            body.hovering #cursor .ring {
                width: 52px;
                height: 52px;
                border-color: var(--gold);
            }

            body.hovering #cursor .dot {
                transform: translate(-50%, -50%) scale(0);
            }

            /* ── LAYOUT ── */
            header {
                width: 100%;
                padding: 32px 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid var(--border);
                position: relative;
                z-index: 10;
            }

            a {
                text-decoration: none;
            }

            .logo {
                font-family: 'Playfair Display', serif;
                font-size: 1.3rem;
                letter-spacing: 0.35em;
                color: var(--cream);
            }

            .logo span {
                color: var(--gold);
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 40px;
            }

            .score-display {
                text-align: center;
            }

            .score-num {
                font-family: 'Playfair Display', serif;
                font-size: 2rem;
                font-weight: 900;
                color: var(--gold);
                line-height: 1;
            }

            .score-label {
                font-family: 'Space Mono', monospace;
                font-size: 0.78rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--cream);
            }

            .streak-display {
                text-align: center;
            }

            .streak-num {
                font-family: 'Playfair Display', serif;
                font-size: 2rem;
                font-weight: 900;
                color: var(--cream);
                line-height: 1;
            }

            main {
                flex: 1;
                width: 100%;
                max-width: 900px;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 60px 40px 80px;
                gap: 0;
            }

            /* ── DIFFICULTY ── */
            .difficulty-bar {
                display: flex;
                gap: 2px;
                margin-bottom: 52px;
                border: 1px solid var(--border);
                overflow: hidden;
            }

            .diff-btn {
                padding: 12px 36px;
                background: transparent;
                border: none;
                font-family: 'Space Mono', monospace;
                font-size: 0.65rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--muted);
                cursor: none;
                transition: color 0.3s, background 0.3s;
                position: relative;
            }

            .diff-btn.active {
                background: rgba(201, 168, 76, 0.1);
                color: var(--gold);
            }

            .diff-btn.reset {
                background: rgba(201, 168, 76, 0.1);
                color: var(--gold);
                font-size: 0.7rem;
            }

            .diff-btn:hover:not(.active) {
                color: var(--cream);
                background: rgba(255, 255, 255, 0.03);
            }

            .diff-btn::after {
                content: attr(data-hint);
                display: block;
                font-size: 0.5rem;
                letter-spacing: 0.1em;
                margin-top: 3px;
                opacity: 0.5;
            }

            /* ── QUESTION AREA ── */
            .question-area {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 48px;
            }

            /* ── SWATCH ── */
            .swatch-wrap {
                position: relative;
            }

            .swatch {
                width: 280px;
                height: 280px;
                border-radius: 50%;
                position: relative;
                overflow: hidden;
                box-shadow: 0 0 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
                transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1);
            }

            .swatch.pop {
                animation: swatchPop 0.5s cubic-bezier(0.2, 0.8, 0.3, 1);
            }

            .swatch-shimmer {
                position: absolute;
                inset: 0;
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, transparent 50%, rgba(0, 0, 0, 0.1) 100%);
                pointer-events: none;
            }

            .swatch-label {
                position: absolute;
                bottom: -32px;
                left: 50%;
                transform: translateX(-50%);
                font-family: 'Space Mono', monospace;
                font-size: 0.6rem;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                color: var(--muted);
                white-space: nowrap;
            }

            /* ── QUESTION TEXT ── */
            .question-text {
                text-align: center;
            }

            .question-eyebrow {
                font-family: 'Space Mono', monospace;
                font-size: 0.65rem;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                color: var(--gold);
                margin-bottom: 12px;
            }

            .question-main {
                font-family: 'Playfair Display', serif;
                font-size: clamp(1.8rem, 4vw, 2.8rem);
                font-weight: 700;
                line-height: 1.1;
                color: var(--cream);
            }

            .question-main em {
                font-style: italic;
                color: var(--gold);
            }

            /* ── OPTIONS ── */
            .options-grid {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 10px;
                width: 100%;
            }

            .option-btn {
                background: var(--dim);
                border: 1px solid var(--border);
                padding: 20px 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
                cursor: none;
                position: relative;
                overflow: hidden;
                transition: border-color 0.2s, transform 0.2s, background 0.2s;
            }

            .option-btn:hover:not(:disabled) {
                border-color: rgba(201, 168, 76, 0.4);
                background: rgba(201, 168, 76, 0.05);
                transform: translateY(-5px);
            }

            .option-btn:disabled {
                cursor: not-allowed, none;
            }

            .option-hex {
                font-family: 'Space Mono', monospace;
                font-size: 1rem;
                letter-spacing: 0.17em;
                text-transform: uppercase;
                color: var(--cream);
                line-height: 1.4;
                text-align: center;
            }

            .option-btn .ripple {
                position: absolute;
                border-radius: 50%;
                background: rgba(201, 168, 76, 0.15);
                transform: scale(0);
                animation: ripple 0.5s ease-out;
            }

            /* ── RESULT STATES ── */
            .option-btn.correct {
                border-color: #4caf82;
                background: rgba(76, 175, 130, 0.08);
                animation: correctPulse 0.5s ease;
            }

            .option-btn.correct .option-hex {
                color: #4caf82;
            }

            .option-btn.wrong {
                border-color: #c94c4c;
                background: rgba(201, 76, 76, 0.08);
                animation: wrongShake 0.4s ease;
            }

            .option-btn.wrong .option-hex {
                color: #c94c4c;
            }

            .option-btn.reveal {
                border-color: #4caf82;
                background: rgba(76, 175, 130, 0.08);
            }

            .option-btn.reveal .option-hex {
                color: #4caf82;
            }

            /* ── FEEDBACK ── */
            .feedback {
                height: 80px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                text-align: center;
                transition: opacity 0.3s;
            }

            .feedback-title {
                font-family: 'Playfair Display', serif;
                font-size: 1.8rem;
                font-weight: 900;
            }

            .feedback-title.good {
                color: #4caf82;
            }

            .feedback-title.bad {
                color: #c94c4c;
            }

            .feedback-sub {
                font-family: 'Space Mono', monospace;
                font-size: 0.62rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--muted);
            }

            /* ── NEXT BTN ── */
            .next-btn {
                display: inline-block;
                padding: 16px 56px;
                border: 1px solid var(--gold);
                color: var(--gold);
                background: transparent;
                font-family: 'Space Mono', monospace;
                font-size: 0.68rem;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                cursor: none;
                position: relative;
                overflow: hidden;
                transition: color 0.4s;
                opacity: 0;
                pointer-events: none;
                transform: translateY(10px);
                transition: color 0.4s, opacity 0.4s, transform 0.4s;
            }

            .next-btn::before {
                content: '';
                position: absolute;
                inset: 0;
                background: var(--gold);
                transform: translateX(-102%);
                transition: transform 0.4s cubic-bezier(0.3, 0, 0, 1);
                z-index: -1;
            }

            .next-btn:hover {
                color: var(--ink);
            }

            .next-btn:hover::before {
                transform: translateX(0);
            }

            .next-btn.visible {
                opacity: 1;
                pointer-events: all;
                transform: translateY(0);
            }

            /* ── PROGRESS ── */
            .progress-wrap {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 32px;
            }

            .progress-meta {
                display: flex;
                justify-content: space-between;
                font-family: 'Space Mono', monospace;
                font-size: 0.58rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .progress-bar {
                height: 2px;
                background: rgba(255, 255, 255, 0.06);
                border-radius: 1px;
                overflow: hidden;
            }

            .progress-fill {
                height: 100%;
                background: var(--gold);
                transition: width 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
                border-radius: 1px;
            }

            /* ── ROUND COUNTER DOTS ── */
            .round-dots {
                display: flex;
                gap: 6px;
                justify-content: center;
                flex-wrap: wrap;
                margin-bottom: 0;
            }

            .round-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                border: 1px solid var(--border);
                transition: background 0.4s, border-color 0.4s;
            }

            .round-dot.done-correct {
                background: #4caf82;
                border-color: #4caf82;
            }

            .round-dot.done-wrong {
                background: #c94c4c;
                border-color: #c94c4c;
            }

            .round-dot.current {
                border-color: var(--gold);
                box-shadow: 0 0 6px rgba(201, 168, 76, 0.4);
            }

            /* ── GAME OVER ── */
            .gameover {
                display: none;
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 32px;
                width: 100%;
                animation: fadeInUp 0.6s ease forwards;
            }

            .gameover.show {
                display: flex;
            }

            .gameover-eyebrow {
                font-family: 'Space Mono', monospace;
                font-size: 0.68rem;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: var(--gold);
            }

            .gameover-title {
                font-family: 'Playfair Display', serif;
                font-size: clamp(3rem, 8vw, 6rem);
                font-weight: 900;
                color: var(--cream);
                line-height: 0.95;
            }

            .gameover-title span {
                color: var(--gold);
                font-style: italic;
            }

            .gameover-stats {
                display: flex;
                gap: 60px;
                justify-content: center;
                flex-wrap: wrap;
            }

            .go-stat .go-num {
                font-family: 'Playfair Display', serif;
                font-size: 3rem;
                font-weight: 900;
                color: var(--gold);
                line-height: 1;
            }

            .go-stat .go-label {
                font-family: 'Space Mono', monospace;
                font-size: 0.6rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .gameover-divider {
                width: 120px;
                height: 1px;
                background: var(--border);
            }

            .grade {
                font-family: 'Playfair Display', serif;
                font-style: italic;
                font-size: 1.4rem;
                color: var(--muted);
                max-width: 400px;
                line-height: 1.5;
            }

            .play-again {
                padding: 18px 64px;
                background: var(--gold);
                color: var(--ink);
                border: none;
                font-family: 'Space Mono', monospace;
                font-size: 0.7rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                font-weight: 700;
                cursor: none;
                transition: background 0.3s, transform 0.2s;
            }

            .play-again:hover {
                background: var(--gold-light);
                transform: translateY(-2px);
            }

            /* ── DECORATIVE ── */
            .corner-deco {
                position: fixed;
                font-family: 'Space Mono', monospace;
                font-size: 0.55rem;
                letter-spacing: 0.2em;
                color: rgba(201, 168, 76, 0.2);
                pointer-events: none;
            }

            .corner-deco.tl {
                top: 20px;
                left: 20px;
            }

            .corner-deco.br {
                bottom: 20px;
                right: 20px;
            }

            /* ── ANIMATIONS ── */
            @keyframes swatchPop {
                0% {
                    transform: scale(0.92);
                    opacity: 0.6;
                }

                60% {
                    transform: scale(1.03);
                }

                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            @keyframes correctPulse {
                0% {
                    transform: scale(1);
                }

                30% {
                    transform: scale(1.04);
                }

                100% {
                    transform: scale(1);
                }
            }

            @keyframes wrongShake {

                0%,
                100% {
                    transform: translateX(0);
                }

                20% {
                    transform: translateX(-6px);
                }

                40% {
                    transform: translateX(6px);
                }

                60% {
                    transform: translateX(-4px);
                }

                80% {
                    transform: translateX(4px);
                }
            }

            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }

                to {
                    opacity: 1;
                }
            }

            /* ── RESPONSIVE ── */
            @media (max-width: 700px) {
                header {
                    padding: 20px 24px;
                }

                main {
                    padding: 40px 20px 60px;
                }

                .options-grid {
                    grid-template-columns: repeat(3, 1fr);
                    gap: 8px;
                }

                .options-grid .option-btn:nth-child(4),
                .options-grid .option-btn:nth-child(5) {
                    grid-column: span 1;
                }

                .swatch {
                    width: 200px;
                    height: 200px;
                }

                .diff-btn {
                    padding: 12px 20px;
                }
            }
        </style>
    </head>

    <body>

        <div id="cursor">
            <div class="ring"></div>
            <div class="dot"></div>
        </div>
        <div class="corner-deco tl">CS50 v1.0 / HEX COLOUR GAME</div>
        <div class="corner-deco br" id="diffLabel">DIFFICULTY: EASY</div>

        <header>
            <a href='csgame.html' class="logo">CS<span>50</span></a>
            <div class="header-right">
                <a href="csgame.html" class="score-num">Home</a>
                <div class="streak-display">
                    <div class="streak-num" id="streakNum">0</div>
                    <div class="score-label">Streak 🔥</div>
                </div>
                <div class="score-display">
                    <div class="score-num" id="scoreNum">0</div>
                    <div class="score-label">Score</div>
                </div>
            </div>
        </header>

        <main>

            <!-- DIFFICULTY -->
            <div class="difficulty-bar" id="diffBar">
                <button class="diff-btn active" data-diff="easy" data-hint="Colors vary widely">Easy</button>
                <button class="diff-btn" data-diff="medium" data-hint="Similar hues">Medium</button>
                <button class="diff-btn" data-diff="hard" data-hint="Nearly identical">Hard</button>
                <button class="diff-btn reset" id="playAgain">Reset</button>
            </div>

            <!-- GAME AREA -->
            <div class="question-area" id="gameArea">

                <!-- Progress -->
                <div class="progress-wrap">
                    <div class="progress-meta">
                        <span id="roundLabel">Round 1 of 10</span>
                        <span id="accuracyLabel">Accuracy % —</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                </div>

                <div class="round-dots" id="roundDots"></div>

                <!-- Swatch -->
                <div class="swatch-wrap">
                    <div class="swatch" id="swatch">
                        <div class="swatch-shimmer"></div>
                    </div>
                    <div class="swatch-label">What hex is this?</div>
                </div>

                <!-- Options -->
                <div class="options-grid" id="optionsGrid"></div>

                <!-- Feedback -->
                <div class="feedback" id="feedback">
                    <div class="feedback-title" id="feedbackTitle"></div>
                    <div class="feedback-sub" id="feedbackSub"></div>
                </div>

                <!-- Next -->
                <button class="next-btn" id="nextBtn">Next colour →</button>

            </div>

            <!-- GAME OVER -->
            <div class="gameover" id="gameOver">
                <p class="gameover-eyebrow">Game complete</p>
                <h2 class="gameover-title" id="goTitle">Well<br><span>played.</span></h2>
                <div class="gameover-divider"></div>
                <div class="gameover-stats">
                    <div class="go-stat">
                        <div class="go-num" id="goScore">0</div>
                        <div class="go-label">Final Score</div>
                    </div>
                    <div class="go-stat">
                        <div class="go-num" id="goCorrect">0/10</div>
                        <div class="go-label">Correct</div>
                    </div>
                    <div class="go-stat">
                        <div class="go-num" id="goBest">0</div>
                        <div class="go-label">Best Streak</div>
                    </div>
                </div>
                <p class="grade" id="goGrade"></p>
                <button class="play-again" id="playAgain1">Play again</button>
            </div>

        </main>

        <script>
            // ── CURSOR ──
            const cursorEl = document.getElementById('cursor');
            const dot = cursorEl.querySelector('.dot');
            const ring = cursorEl.querySelector('.ring');
            let mx = -100,
                my = -100,
                rx = -100,
                ry = -100;
            document.addEventListener('mousemove', e => {
                mx = e.clientX;
                my = e.clientY;
                dot.style.left = mx + 'px';
                dot.style.top = my + 'px';
            });
            (function loop() {
                rx += (mx - rx) * 0.12;
                ry += (my - ry) * 0.12;
                ring.style.left = rx + 'px';
                ring.style.top = ry + 'px';
                requestAnimationFrame(loop);
            })();

            function setHover(v) {
                document.body.classList.toggle('hovering', v);
            }
            document.querySelectorAll('button, .diff-btn').forEach(el => {
                el.addEventListener('mouseenter', () => setHover(true));
                el.addEventListener('mouseleave', () => setHover(false));
            });

            // ── GAME STATE ──
            const TOTAL_ROUNDS = 10;
            let difficulty = 'easy';
            let round = 0,
                score = 0,
                streak = 0,
                bestStreak = 0;
            let correctPerRound = []; // true/false per round
            let answered = false;
            let correctHex = '';

            const DIFFICULTY_POINTS = {
                easy: 100,
                medium: 200,
                hard: 350
            };
            const DIFFICULTY_VARIANCE = {
                easy: 80,
                medium: 30,
                hard: 10
            };

            // ── UTILS ──
            function randInt(a, b) {
                return Math.floor(Math.random() * (b - a + 1)) + a;
            }

            function randomHex() {
                const r = randInt(0, 255),
                      g = randInt(0, 255),
                      b = randInt(0, 255);
                return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`.toUpperCase();
            }

            function hexToRGB(hex) {
                const h = hex.replace('#', '');
                return {
                    r: parseInt(h.slice(0, 2), 16),
                    g: parseInt(h.slice(2, 4), 16),
                    b: parseInt(h.slice(4, 6), 16)
                };
            }

            function clamp(v, mn, mx) {
                return Math.max(mn, Math.min(mx, v));
            }

            function varyHex(hex, variance) {
                const {
                    r,
                    g,
                    b
                } = hexToRGB(hex);
                const nr = clamp(r + randInt(-variance, variance), 0, 255);
                const ng = clamp(g + randInt(-variance, variance), 0, 255);
                const nb = clamp(b + randInt(-variance, variance), 0, 255);
                return `#${nr.toString(16).padStart(2,'0')}${ng.toString(16).padStart(2,'0')}${nb.toString(16).padStart(2,'0')}`.toUpperCase();
            }

            function colorDist(h1, h2) {
                const a = hexToRGB(h1),
                      b = hexToRGB(h2);
                return Math.sqrt((a.r - b.r) ** 2 + (a.g - b.g) ** 2 + (a.b - b.b) ** 2);
            }

            function generateOptions(correct, diff) {
                const variance = DIFFICULTY_VARIANCE[diff];
                const options = [correct];
                let attempts = 0;
                while (options.length < 5 && attempts < 200) {
                    attempts++;
                    let candidate;
                    if (diff === 'easy') {
                        candidate = randomHex();
                        if (colorDist(correct, candidate) < 100) continue;
                    } else if (diff === 'medium') {
                        candidate = varyHex(correct, variance + randInt(20, 40));
                        if (candidate === correct || options.includes(candidate)) continue;
                        if (colorDist(correct, candidate) < 15) continue;
                    } else {
                        candidate = varyHex(correct, variance + randInt(5, 15));
                        if (candidate === correct || options.includes(candidate)) continue;
                        if (colorDist(correct, candidate) < 5) continue;
                    }
                    if (!options.includes(candidate)) options.push(candidate);
                }
                // fill if needed
                while (options.length < 5) options.push(varyHex(correct, 60));
                return shuffle(options);
            }

            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = randInt(0, i);
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // ── LUMINANCE ──
            function getLuminance(hex) {
                const {
                    r,
                    g,
                    b
                } = hexToRGB(hex);
                return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            }

            // ── UI HELPERS ──
            function updateRoundDots() {
                const container = document.getElementById('roundDots');
                container.innerHTML = '';
                for (let i = 0; i < TOTAL_ROUNDS; i++) {
                    const d = document.createElement('div');
                    d.className = 'round-dot';
                    if (i < round) {
                        d.classList.add(correctPerRound[i] ? 'done-correct' : 'done-wrong');
                    } else if (i === round) {
                        d.classList.add('current');
                    }
                    container.appendChild(d);
                }
            }

            function updateProgress() {
                const pct = (round / TOTAL_ROUNDS) * 100;
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('roundLabel').textContent = `Round ${round + 1} of ${TOTAL_ROUNDS}`;
                const correct = correctPerRound.filter(Boolean).length;
                const acc = round > 0 ? Math.round((correct / round) * 100) : '—';
                document.getElementById('accuracyLabel').textContent = `Accuracy ${round > 0 ? acc + '%' : '—'}`;
            }

            function setScore(s) {
                score = s;
                document.getElementById('scoreNum').textContent = score;
            }

            function setStreak(s) {
                streak = s;
                if (streak > bestStreak) bestStreak = streak;
                document.getElementById('streakNum').textContent = streak;
            }

            // ── RENDER ROUND ──
            function renderRound() {
                if (round >= TOTAL_ROUNDS) {
                    showGameOver();
                    return;
                }
                answered = false;
                correctHex = randomHex();

                // swatch
                const swatch = document.getElementById('swatch');
                swatch.style.background = correctHex;
                swatch.classList.remove('pop');
                void swatch.offsetWidth; // reflow
                swatch.classList.add('pop');

                // options
                const options = generateOptions(correctHex, difficulty);
                const grid = document.getElementById('optionsGrid');
                grid.innerHTML = '';
                options.forEach(hex => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = `
        <div class="option-dot" style="background:${hex}"></div>
        <div class="option-hex">${hex}</div>
      `;
                    btn.addEventListener('mouseenter', () => setHover(true));
                    btn.addEventListener('mouseleave', () => setHover(false));
                    btn.addEventListener('click', (e) => handleAnswer(e, btn, hex));
                    grid.appendChild(btn);
                });

                // feedback clear
                document.getElementById('feedbackTitle').textContent = '';
                document.getElementById('feedbackSub').textContent = '';
                document.getElementById('nextBtn').classList.remove('visible');

                updateProgress();
                updateRoundDots();
            }

            function handleAnswer(e, btn, chosen) {
                if (answered) return;
                answered = true;

                // ripple
                const rect = btn.getBoundingClientRect();
                const rEl = document.createElement('div');
                rEl.className = 'ripple';
                const size = Math.max(rect.width, rect.height);
                rEl.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
                btn.appendChild(rEl);
                setTimeout(() => rEl.remove(), 500);

                // disable all
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

                const isCorrect = chosen === correctHex;
                correctPerRound.push(isCorrect);

                if (isCorrect) {
                    btn.classList.add('correct');
                    const pts = DIFFICULTY_POINTS[difficulty] + (streak * 20);
                    setScore(score + pts);
                    setStreak(streak + 1);
                    document.getElementById('feedbackTitle').textContent = pickCorrectPhrase();
                    document.getElementById('feedbackTitle').className = 'feedback-title good';
                    document.getElementById('feedbackSub').textContent = `+${pts} pts${streak > 1 ? ' · ' + streak + '× streak bonus' : ''}`;
                } else {
                    btn.classList.add('wrong');
                    setStreak(0);
                    // reveal correct
                    document.querySelectorAll('.option-btn').forEach(b => {
                        if (b.querySelector('.option-hex').textContent.trim() === correctHex) {
                            b.classList.add('reveal');
                        }
                    });
                    document.getElementById('feedbackTitle').textContent = pickWrongPhrase();
                    document.getElementById('feedbackTitle').className = 'feedback-title bad';
                    document.getElementById('feedbackSub').textContent = `The answer was ${correctHex}`;
                }

                round++;
                document.getElementById('nextBtn').classList.add('visible');
                updateRoundDots();
            }

            function pickCorrectPhrase() {
                const p = ['Exquisite.', 'Magnificent.', 'Parfait.', 'Brilliant.', 'Splendid.', 'Impeccable.'];
                return p[randInt(0, p.length - 1)];
            }

            function pickWrongPhrase() {
                const p = ['Not quite.', 'So close.', 'Almost.', 'Not this time.', 'Keep trying.'];
                return p[randInt(0, p.length - 1)];
            }

            // ── GAME OVER ──
            function showGameOver() {
                document.getElementById('gameArea').style.display = 'none';
                const go = document.getElementById('gameOver');
                go.classList.add('show');

                const correct = correctPerRound.filter(Boolean).length;
                const pct = Math.round((correct / TOTAL_ROUNDS) * 100);

                document.getElementById('goScore').textContent = score;
                document.getElementById('goCorrect').textContent = `${correct}/${TOTAL_ROUNDS}`;
                document.getElementById('goBest').textContent = bestStreak;

                let title, grade;
                if (pct === 100) {
                    title = 'Flawless<br><span>mastery.</span>';
                    grade = '"A perfect eye for colour. You see what others miss."';
                } else if (pct >= 80) {
                    title = 'Well<br><span>played.</span>';
                    grade = '"An exceptional sense of colour — the art world awaits."';
                } else if (pct >= 60) {
                    title = 'Not<br><span>bad.</span>';
                    grade = '"Your colour intuition is developing. Practice makes perfect."';
                } else if (pct >= 40) {
                    title = 'Keep<br><span>trying.</span>';
                    grade = '"The spectrum eludes you still — but every artist starts somewhere."';
                } else {
                    title = 'Colour<br><span>blind?</span>';
                    grade = '"Perhaps painting is not your calling. Perhaps."';
                }

                document.getElementById('goTitle').innerHTML = title;
                document.getElementById('goGrade').textContent = grade;

                [document.getElementById('playAgain')].forEach(el => {
                    el.addEventListener('mouseenter', () => setHover(true));
                    el.addEventListener('mouseleave', () => setHover(false));
                });
            }

            // ── DIFFICULTY ──
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.addEventListener('mouseenter', () => setHover(true));
                btn.addEventListener('mouseleave', () => setHover(false));
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    difficulty = btn.dataset.diff;
                    document.getElementById('diffLabel').textContent = 'DIFFICULTY: ' + difficulty.toUpperCase();
                    if (round === 0) renderRound();
                });
            });

            // ── NEXT / PLAY AGAIN ──
            document.getElementById('nextBtn').addEventListener('click', () => {
                document.getElementById('nextBtn').classList.remove('visible');
                renderRound();
            });
            document.getElementById('nextBtn').addEventListener('mouseenter', () => setHover(true));
            document.getElementById('nextBtn').addEventListener('mouseleave', () => setHover(false));

            document.getElementById('playAgain').addEventListener('click', () => {
                round = 0;
                score = 0;
                streak = 0;
                bestStreak = 0;
                correctPerRound = [];
                setScore(0);
                setStreak(0);
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('gameArea').style.display = 'flex';
                document.getElementById('gameArea').style.flexDirection = 'column';
                document.getElementById('gameArea').style.alignItems = 'center';
                document.getElementById('gameArea').style.gap = '48px';
                renderRound();

                document.getElementById('playAgain1').addEventListener('click', () => {
                    round = 0;
                    score = 0;
                    streak = 0;
                    bestStreak = 0;
                    correctPerRound = [];
                    setScore(0);
                    setStreak(0);
                    document.getElementById('gameOver').classList.remove('show');
                    document.getElementById('gameArea').style.display = 'flex';
                    document.getElementById('gameArea').style.flexDirection = 'column';
                    document.getElementById('gameArea').style.alignItems = 'center';
                    document.getElementById('gameArea').style.gap = '48px';
                    renderRound();
                });
            });

            // ── INIT ──
            renderRound();

            window.onbeforeunload = () => {
                localStorage.setItem("scroll", window.scrollY);
            };

            window.onload = () => {
                const scroll = localStorage.getItem("scroll");
                if (scroll) window.scrollTo(0, scroll);
            };
        </script>
    </body>

</html>
