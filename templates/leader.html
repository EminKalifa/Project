<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CS50 - Leaderboard</title>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --ink: #0a0a0f;
                --gold: #c9a84c;
                --gl: #e8c97a;
                --cream: #ede8de;
                --muted: #5a5550;
                --d2: #1a1a24;
                --bd: rgba(201, 168, 76, .15);
                --gr: #4caf82;
                --rd: #c94c4c;
            }

            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--ink);
                color: var(--cream);
                font-family: "Cormorant Garamond", serif;
                min-height: 100vh;
                cursor: none;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                z-index: 9998;
                pointer-events: none;
                opacity: .04;
                background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0 0/200px;
            }

            #cur {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 9999;
                pointer-events: none;
            }

            .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--gold);
                position: absolute;
                transform: translate(-50%, -50%);
            }

            .ring {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 1px solid rgba(201, 168, 76, .5);
                position: absolute;
                transform: translate(-50%, -50%);
                transition: width .3s, height .3s, border-color .3s;
            }

            body.hov .ring {
                width: 52px;
                height: 52px;
                border-color: var(--gold);
            }

            body.hov .dot {
                transform: translate(-50%, -50%) scale(0);
            }

            /* NAV */
            nav {
                width: 100%;
                padding: 28px 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid var(--bd);
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(10, 10, 15, .95);
                backdrop-filter: blur(8px);
            }

            .logo {
                font-family: "Playfair Display", serif;
                font-size: 1.3rem;
                letter-spacing: .38em;
                color: var(--cream);
                text-decoration: none;
            }

            .logo span {
                color: var(--gold);
            }

            .tnav {
                display: flex;
                gap: 28px;
            }

            .tnav a {
                font-family: "Space Mono", monospace;
                font-size: .6rem;
                letter-spacing: .18em;
                text-transform: uppercase;
                color: var(--muted);
                text-decoration: none;
                transition: color .3s;
            }

            .tnav a:hover,
            .tnav a.on {
                color: var(--gold);
            }

            /* HERO */
            .lbhero {
                padding: 80px 60px 60px;
                position: relative;
                overflow: hidden;
                border-bottom: 1px solid var(--bd);
            }

            .lbhero-bg {
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(201, 168, 76, .05), transparent 70%), radial-gradient(ellipse 40% 50% at 20% 30%, rgba(139, 44, 44, .12), transparent 60%);
            }

            .lbhero-inner {
                position: relative;
                z-index: 1;
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                gap: 40px;
                flex-wrap: wrap;
            }

            .lbhero-left {}

            .lb-ey {
                font-family: "Space Mono", monospace;
                font-size: .62rem;
                letter-spacing: .28em;
                text-transform: uppercase;
                color: var(--gold);
                margin-bottom: 12px;
            }

            .lb-title {
                font-family: "Playfair Display", serif;
                font-size: clamp(3rem, 6vw, 5.5rem);
                font-weight: 900;
                color: var(--cream);
                line-height: .92;
                margin-bottom: 16px;
            }

            .lb-title em {
                font-style: italic;
                color: var(--gold);
            }

            .lb-sub {
                font-size: 1.05rem;
                color: var(--muted);
                font-weight: 300;
                max-width: 400px;
                line-height: 1.7;
            }

            .lb-stats {
                display: flex;
                gap: 48px;
                flex-wrap: wrap;
            }

            .lbs {
                text-align: right;
            }

            .lbs-n {
                font-family: "Playfair Display", serif;
                font-size: 3rem;
                font-weight: 900;
                color: var(--gold);
                line-height: 1;
            }

            .lbs-l {
                font-family: "Space Mono", monospace;
                font-size: .58rem;
                letter-spacing: .2em;
                text-transform: uppercase;
                color: var(--muted);
            }

            /* FILTER BAR */
            .filter-bar {
                padding: 28px 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 20px;
                flex-wrap: wrap;
                border-bottom: 1px solid var(--bd);
            }

            .filters {
                display: flex;
                gap: 4px;
            }

            .fb {
                padding: 10px 24px;
                background: transparent;
                border: 1px solid var(--bd);
                font-family: "Space Mono", monospace;
                font-size: .6rem;
                letter-spacing: .16em;
                text-transform: uppercase;
                color: var(--muted);
                cursor: none;
                transition: color .3s, border-color .3s, background .3s;
            }

            .fb.on {
                background: rgba(201, 168, 76, .1);
                border-color: rgba(201, 168, 76, .4);
                color: var(--gold);
            }

            .fb:hover:not(.on) {
                color: var(--cream);
                border-color: rgba(201, 168, 76, .25);
            }

            .search-wrap {
                position: relative;
            }

            .search-wrap input {
                padding: 10px 16px 10px 36px;
                background: var(--d2);
                border: 1px solid var(--bd);
                color: var(--cream);
                font-family: "Space Mono", monospace;
                font-size: .68rem;
                letter-spacing: .04em;
                outline: none;
                width: 220px;
                transition: border-color .3s;
                caret-color: var(--gold);
                cursor: none;
            }

            .search-wrap input:focus {
                border-color: rgba(201, 168, 76, .45);
            }

            .search-wrap input::placeholder {
                color: rgba(90, 85, 80, .5);
            }

            .search-icon {
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--muted);
                font-size: .8rem;
                pointer-events: none;
            }

            /* TABLE */
            .lb-wrap {
                padding: 0 60px 80px;
            }

            .lb-table {
                width: 100%;
                margin-top: 0;
            }

            .lb-head {
                display: grid;
                grid-template-columns: 64px 1fr 140px 120px 120px 100px;
                gap: 0;
                padding: 16px 24px;
                border-bottom: 1px solid var(--bd);
            }

            .lh {
                font-family: "Space Mono", monospace;
                font-size: .55rem;
                letter-spacing: .2em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .lh.r {
                text-align: right;
            }

            .lb-row {
                display: grid;
                grid-template-columns: 64px 1fr 140px 120px 120px 100px;
                gap: 0;
                padding: 20px 24px;
                border-bottom: 1px solid rgba(201, 168, 76, .06);
                transition: background .25s;
                align-items: center;
                animation: rowIn .4s ease both;
            }

            .lb-row:hover {
                background: rgba(201, 168, 76, .03);
            }

            /* RANK */
            .rank {
                font-family: "Playfair Display", serif;
                font-size: 1.4rem;
                font-weight: 900;
                color: var(--muted);
            }

            .rank.g1 {
                color: var(--gold);
            }

            .rank.g2 {
                color: #c0c0c0;
            }

            .rank.g3 {
                color: #cd7f32;
            }

            .crown {
                font-size: 1rem;
                margin-left: 4px;
            }

            /* PLAYER */
            .player {
                display: flex;
                align-items: center;
                gap: 14px;
            }

            .avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: 1px solid var(--bd);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Playfair Display", serif;
                font-size: 1rem;
                font-weight: 900;
                flex-shrink: 0;
            }

            .pname {
                font-family: "Playfair Display", serif;
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--cream);
                display: block;
                line-height: 1.2;
            }

            .ptag {
                font-family: "Space Mono", monospace;
                font-size: .52rem;
                letter-spacing: .12em;
                text-transform: uppercase;
                color: var(--muted);
            }

            /* SCORES */
            .cell {
                font-family: "Playfair Display", serif;
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--cream);
                text-align: right;
            }

            .cell.gold {
                color: var(--gold);
            }

            .cell small {
                display: block;
                font-family: "Space Mono", monospace;
                font-size: .5rem;
                letter-spacing: .12em;
                text-transform: uppercase;
                color: var(--muted);
                font-weight: 400;
            }

            /* BADGE */
            .badge {
                display: inline-flex;
                align-items: center;
                justify-content: flex-end;
                gap: 4px;
            }

            .bdg {
                font-family: "Space Mono", monospace;
                font-size: .52rem;
                letter-spacing: .1em;
                text-transform: uppercase;
                padding: 4px 8px;
                border: 1px solid;
                border-radius: 1px;
            }

            .bdg.hex {
                border-color: rgba(201, 168, 76, .3);
                color: var(--gold);
                background: rgba(201, 168, 76, .06);
            }

            .bdg.hexrev {
                border-color: rgba(201, 76, 76, .3);
                color: #c94c4c;
                background: rgba(201, 76, 76, .06);
            }

            .bdg.bin {
                border-color: rgba(76, 175, 130, .3);
                color: var(--gr);
                background: rgba(76, 175, 130, .05);
            }

            .bdg.chr {
                border-color: rgba(100, 140, 220, .3);
                color: #7aa0e0;
                background: rgba(100, 140, 220, .05);
            }

            /* GAME SELECTOR TABS */
            .game-tabs {
                display: flex;
                gap: 2px;
                margin: 32px 60px 0;
                border-bottom: 1px solid var(--bd);
            }

            .gt {
                padding: 14px 28px;
                background: transparent;
                border: none;
                border-bottom: 2px solid transparent;
                font-family: "Space Mono", monospace;
                font-size: .6rem;
                letter-spacing: .16em;
                text-transform: uppercase;
                color: var(--muted);
                cursor: none;
                transition: color .3s, border-color .3s;
                margin-bottom: -1px;
            }

            .gt.on {
                color: var(--gold);
                border-bottom-color: var(--gold);
            }

            .gt:hover:not(.on) {
                color: var(--cream);
            }

            /* TOP 3 PODIUM */
            .podium {
                padding: 48px 60px 40px;
                display: flex;
                justify-content: center;
                gap: 20px;
                align-items: flex-end;
                border-bottom: 1px solid var(--bd);
            }

            .pod {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                width: 180px;
            }

            .pod-card {
                width: 100%;
                padding: 28px 16px;
                border: 1px solid var(--bd);
                background: var(--d2);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                position: relative;
                transition: border-color .3s;
            }

            .pod-card:hover {
                border-color: rgba(201, 168, 76, .3);
            }

            .pod.p1 .pod-card {
                border-color: rgba(201, 168, 76, .35);
                background: rgba(201, 168, 76, .04);
            }

            .pod.p1 {
                transform: translateY(-20px);
            }

            .pod-rank {
                font-family: "Playfair Display", serif;
                font-size: 2.5rem;
                font-weight: 900;
            }

            .p1 .pod-rank {
                color: var(--gold);
            }

            .p2 .pod-rank {
                color: #c0c0c0;
            }

            .p3 .pod-rank {
                color: #cd7f32;
            }

            .pod-avatar {
                width: 52px;
                height: 52px;
                border-radius: 50%;
                border: 2px solid var(--bd);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Playfair Display", serif;
                font-size: 1.3rem;
                font-weight: 900;
            }

            .p1 .pod-avatar {
                border-color: var(--gold);
            }

            .pod-name {
                font-family: "Playfair Display", serif;
                font-size: 1rem;
                font-weight: 700;
                color: var(--cream);
                text-align: center;
            }

            .pod-score {
                font-family: "Space Mono", monospace;
                font-size: .65rem;
                letter-spacing: .12em;
                color: var(--gold);
            }

            .pod-game {
                font-family: "Space Mono", monospace;
                font-size: .5rem;
                letter-spacing: .1em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .pod-label {
                font-family: "Space Mono", monospace;
                font-size: .55rem;
                letter-spacing: .18em;
                text-transform: uppercase;
                color: var(--muted);
            }

            /* EMPTY */
            .empty {
                padding: 80px;
                text-align: center;
            }

            .empty-t {
                font-family: "Playfair Display", serif;
                font-size: 2rem;
                font-weight: 700;
                color: var(--muted);
                margin-bottom: 12px;
                font-style: italic;
            }

            .empty-s {
                font-family: "Space Mono", monospace;
                font-size: .6rem;
                letter-spacing: .16em;
                text-transform: uppercase;
                color: rgba(90, 85, 80, .5);
            }

            .cr {
                position: fixed;
                font-family: "Space Mono", monospace;
                font-size: .5rem;
                letter-spacing: .16em;
                color: rgba(201, 168, 76, .18);
                pointer-events: none;
            }

            .tl {
                top: 18px;
                left: 18px;
            }

            .brr {
                bottom: 18px;
                right: 18px;
            }

            @keyframes fu {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes rowIn {
                from {
                    opacity: 0;
                    transform: translateX(-8px);
                }

                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            @media(max-width:900px) {
                nav {
                    padding: 20px 24px;
                }

                .tnav {
                    display: none;
                }

                .lbhero {
                    padding: 48px 24px 36px;
                }

                .lb-stats {
                    display: none;
                }

                .filter-bar {
                    padding: 20px 24px;
                    flex-direction: column;
                    align-items: flex-start;
                }

                .game-tabs {
                    margin: 24px 24px 0;
                }

                .podium {
                    padding: 32px 24px;
                    gap: 12px;
                }

                .pod {
                    width: 120px;
                }

                .lb-wrap {
                    padding: 0 24px 60px;
                }

                .lb-head {
                    grid-template-columns: 48px 1fr 100px 80px;
                }

                .lb-row {
                    grid-template-columns: 48px 1fr 100px 80px;
                }

                .lh:nth-child(5),
                .lb-row .cell:nth-child(5),
                .lh:nth-child(6),
                .lb-row .badge {
                    display: none;
                }
            }
        </style>
    </head>

    <body>
        <div id="cur">
            <div class="ring"></div>
            <div class="dot"></div>
        </div>
        <div class="cr tl">CS50 / LEADERBOARD</div>
        <div class="cr brr">SEASON 1 🤪&middot; 2026</div>

        <nav>
            <a href="/" class="logo">CS<span>50</span></a>
            <div class="tnav">
                <p>Hello, {{ name }}</p>
                <a href="/">Home</a>
                <a href="/logout">Logout</a>
            </div>
        </nav>

        <!-- HERO -->
        <section class="lbhero">
            <div class="lbhero-bg"></div>
            <div class="lbhero-inner">
                <div class="lbhero-left">
                    <p class="lb-ey">&#10022; Season 1 &middot; All time</p>
                    <h1 class="lb-title">Global<br><em>rankings.</em></h1>
                    <p class="lb-sub">The finest eyes and sharpest minds in colour and code. Updated in real time.</p>
                </div>
                <div class="lb-stats">
                    <div class="lbs">
                        <div class="lbs-n" id="totalPlayers">{{ users }}</div>
                        <div class="lbs-l">Players</div>
                    </div>
                    <div class="lbs">
                        <div class="lbs-n" id="totalGames">{{ games }}</div>
                        <div class="lbs-l">Games played</div>
                    </div>
                    <div class="lbs">
                        <div class="lbs-n" id="topScore">{{ score }}</div>
                        <div class="lbs-l">High score</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- GAME TABS -->
        <div class="game-tabs">
            <button class="gt on" data-game="all">All games</button>
            <button class="gt" data-game="hex">Hex &rarr; Colour</button>
            <button class="gt" data-game="hexrev">Colour &rarr; Hex</button>
            <button class="gt" data-game="bin">Binary &rarr; Char</button>
            <button class="gt" data-game="chr">Char &rarr; Binary</button>
        </div>

        <!-- PODIUM -->
        <div class="podium" id="podium"></div>

        <!-- FILTERS -->
        <div class="filter-bar">
            <div class="filters">
                <button class="fb on" data-f="all">All time</button>
                <button class="fb" data-f="week">This week</button>
                <button class="fb" data-f="today">Today</button>
            </div>
            <div class="search-wrap">
                <span class="search-icon">&#9740;</span>
                <input type="text" id="search" placeholder="Search player...">
            </div>
        </div>

        <!-- TABLE -->
        <div class="lb-wrap">
            <div class="lb-table">
                <div class="lb-head">
                    <div class="lh">#</div>
                    <div class="lh">Player</div>
                    <div class="lh r">Best score</div>
                    <div class="lh r">Streak</div>
                    <div class="lh r">Game</div>
                </div>
                <div id="lbBody"></div>
            </div>
        </div>

        <script>
            const c = document.getElementById("cur"),
                  d = c.querySelector(".dot"),
                  r = c.querySelector(".ring");
            let mx = -100,
                my = -100,
                rx = -100,
                ry = -100;
            document.addEventListener("mousemove", e => {
                mx = e.clientX;
                my = e.clientY;
                d.style.left = mx + "px";
                d.style.top = my + "px";
            });
            (function L() {
                rx += (mx - rx) * .12;
                ry += (my - ry) * .12;
                r.style.left = rx + "px";
                r.style.top = ry + "px";
                requestAnimationFrame(L);
            })();
            const sh = v => document.body.classList.toggle("hov", v);
            document.querySelectorAll("a,button,input").forEach(e => {
                e.addEventListener("mouseenter", () => sh(true));
                e.addEventListener("mouseleave", () => sh(false));
            });

            const DATA = {{ scores | tojson }};



            DATA.forEach(p => {
                p.init = p.username ? p.username[0].toUpperCase() : "?"; // first letter
                p.color = p.username ? `hsl(${p.username.split('').reduce((h,c)=>h+c.charCodeAt(0),0) % 360},70%,50%)` : "#999"; // color
                p.tag = p.username ? p.username.toLowerCase().replace(/\s+/g, "") : "unknown"; // simple tag
            });


            const GAME_LABELS = {
                hex: "Hex",
                hexrev: "Colour",
                bin: "Binary",
                chr: "Char"
            };
            const GAME_CLASSES = {
                hex: "hex",
                hexrev: "hexrev",
                bin: "bin",
                chr: "chr"
            };

            let currentGame = "all";
            let currentFilter = "all";
            let searchQ = "";

            function getFiltered() {
                return DATA.filter(p => {
                    if (currentGame !== "all" && p.game !== currentGame) return false;
                    if (searchQ && !p.username.toLowerCase().includes(searchQ) && !p.tag.toLowerCase().includes(searchQ)) return false;
                    return true;
                });
            }

            function buildPodium(data) {
                const pod = document.getElementById("podium");
                const top3 = data.slice(0, 3);
                const order = [top3[1], top3[0], top3[2]].filter(Boolean);
                const ranks = top3[1] ? [2, 1, 3] : [1, 2, 3];
                pod.innerHTML = "";
                order.forEach((p, i) => {
                    if (!p) return;
                    const rank = ranks[i];
                    const cls = "p" + rank;
                    const crown = rank === 1 ? " &#128081;" : "";
                    const div = document.createElement("div");
                    div.className = "pod " + cls;
                    div.innerHTML = '<div class="pod-card"><div class="pod-rank">#' + rank + '</div><div class="pod-avatar" style="background:' + p.color + '">' + p.init + '</div><div class="pod-name">' + p.username + crown + '</div><div class="pod-score">' + p.score.toLocaleString() + ' pts</div><div class="pod-game">' + GAME_LABELS[p.game] + '</div></div><div class="pod-label">#' + rank + (rank === 1 ? " &bull; Champion" : rank === 2 ? " &bull; Runner-up" : " &bull; Third") + '</div>';
                    pod.appendChild(div);
                });
            }

            function buildTable(data) {
                const body = document.getElementById("lbBody");
                body.innerHTML = "";
                if (data.length === 0) {
                    body.innerHTML = '<div class="empty"><div class="empty-t">No players found.</div><div class="empty-s">Try adjusting your search or filter.</div></div>';
                    return;
                }
                data.forEach((p, i) => {
                    const rank = i + 1;
                    const rankCls = rank === 1 ? "g1" : rank === 2 ? "g2" : rank === 3 ? "g3" : "";
                    const crown = rank === 1 ? " &#128081;" : rank === 2 ? " &#129352;" : rank === 3 ? " &#129353;" : "";
                    const div = document.createElement("div");
                    div.className = "lb-row";
                    div.style.animationDelay = (i * 0.04) + "s";
                    div.innerHTML = `
                    <div class="rank ${rankCls}">#${rank}${crown}</div>
                    <div class="player">
                        <div class="avatar" style="background:${p.color}">${p.init}</div>
                        <div>
                            <span class="pname">${p.username}</span>
                            <span class="ptag">@${p.tag}</span>
                        </div>
                    </div>
                    <div class="cell gold">${p.score.toLocaleString()}<small>Best score</small></div>
                    <div class="cell">${p.streak}x<small>Best streak</small></div>
                    <div class="badge">
                        <span class="bdg ${GAME_CLASSES[p.game]}">${GAME_LABELS[p.game]}</span>
                    </div>
                    `;
                    body.appendChild(div);
                });
            }

            function render() {
                const data = getFiltered();
                buildPodium(data);
                buildTable(data);
            }


            // Redraw leaderboard
            render();

            document.querySelectorAll(".gt").forEach(b => {
                b.addEventListener("click", () => {
                    document.querySelectorAll(".gt").forEach(x => x.classList.remove("on"));
                    b.classList.add("on");
                    currentGame = b.dataset.game;
                    render();
                });
            });
            document.querySelectorAll(".fb").forEach(b => {
                b.addEventListener("click", () => {
                    document.querySelectorAll(".fb").forEach(x => x.classList.remove("on"));
                    b.classList.add("on");
                    currentFilter = b.dataset.f;
                    render();
                });
            });
            document.getElementById("search").addEventListener("input", e => {
                searchQ = e.target.value.trim().toLowerCase();
                render();
            });

            render();
        </script>
    </body>

</html>
