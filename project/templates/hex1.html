<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CS50 — Hex Colour Game</title>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link href="/static/hex1.css" rel="stylesheet">

    </head>

    <body>

        <div id="cursor">
            <div class="ring"></div>
            <div class="dot"></div>
        </div>
        <div class="corner-deco tl">CS50 v1.0 / HEX COLOUR GAME</div>
        <div class="corner-deco br" id="diffLabel">DIFFICULTY: EASY</div>

        <header>
            <a href='/' class="logo">CS<span>50</span></a>
            <div class="header-right">
                <a href="/" class="score-num">Home</a>
                <div class="streak-display">
                    <div class="streak-num" id="streakNum">0</div>
                    <div class="score-label">Streak 🔥</div>
                </div>
                <div class="score-display">
                    <div class="score-num" id="scoreNum">0</div>
                    <div class="score-label">Score</div>
                </div>
            </div>
        </header>

        <main>

            <!-- DIFFICULTY -->
            <div class="difficulty-bar" id="diffBar">
                <button class="diff-btn reset" id="playAgain">Reset</button>
            </div>

            <!-- GAME AREA -->
            <div class="question-area" id="gameArea">

                <!-- Progress -->
                <div class="progress-wrap">
                    <div class="progress-meta">
                        <span id="roundLabel">Round 1 of 10</span>
                        <span id="accuracyLabel">Accuracy % —</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                </div>

                <div class="round-dots" id="roundDots"></div>

                <!-- Swatch -->
                <div class="swatch-wrap">
                    <div class="swatch" id="swatch">
                        <div class="swatch-shimmer"></div>
                    </div>
                    <div class="swatch-label">What hex is this?</div>
                </div>

                <!-- Options -->
                <div class="options-grid" id="optionsGrid"></div>

                <!-- Feedback -->
                <div class="feedback" id="feedback">
                    <div class="feedback-title" id="feedbackTitle"></div>
                    <div class="feedback-sub" id="feedbackSub"></div>
                </div>

                <!-- Next -->
                <button class="next-btn" id="nextBtn">Next colour →</button>

            </div>

            <!-- GAME OVER -->
            <div class="gameover" id="gameOver">
                <p class="gameover-eyebrow">Game complete</p>
                <h2 class="gameover-title" id="goTitle">Well<br><span>played.</span></h2>
                <div class="gameover-divider"></div>
                <div class="gameover-stats">
                    <div class="go-stat">
                        <div class="go-num" id="goScore">0</div>
                        <div class="go-label">Final Score</div>
                    </div>
                    <div class="go-stat">
                        <div class="go-num" id="goCorrect">0/10</div>
                        <div class="go-label">Correct</div>
                    </div>
                    <div class="go-stat">
                        <div class="go-num" id="goBest">0</div>
                        <div class="go-label">Best Streak</div>
                    </div>
                </div>
                <p class="grade" id="goGrade"></p>

                <button class="play-again" id="playAgain1">Continue</button>
            </div>

        </main>

        <script>
            // CURSOR
            const cursorEl = document.getElementById('cursor');
            const dot = cursorEl.querySelector('.dot');
            const ring = cursorEl.querySelector('.ring');
            let mx = -100,
                my = -100,
                rx = -100,
                ry = -100;
            document.addEventListener('mousemove', e => {
                mx = e.clientX;
                my = e.clientY;
                dot.style.left = mx + 'px';
                dot.style.top = my + 'px';
            });
            (function loop() {
                rx += (mx - rx) * 0.12;
                ry += (my - ry) * 0.12;
                ring.style.left = rx + 'px';
                ring.style.top = ry + 'px';
                requestAnimationFrame(loop);
            })();

            function setHover(v) {
                document.body.classList.toggle('hovering', v);
            }
            document.querySelectorAll('button, .diff-btn').forEach(el => {
                el.addEventListener('mouseenter', () => setHover(true));
                el.addEventListener('mouseleave', () => setHover(false));
            });


            const TOTAL_ROUNDS = 10;
            let round = 0;
            let score = 0;
            let streak = 0;
            let bestStreak = 0;
            let corrects = [];
            let correctHex = '';
            let answered = false;

            const POINTS = {
                easy: 100
            };

            // generate hex code

            function randInt(a, b) {
                return Math.floor(Math.random() * (b - a + 1)) + a;
            }

            function randomHex() {
                const r = randInt(0, 255);
                const g = randInt(0, 255);
                const b = randInt(0, 255);

                return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`.toUpperCase();
            }

            function clamp(v, mn, mx) {
                return Math.max(mn, Math.min(mx, v));
            }

            function generateOptions(correct) {
                const options = [correct];
                let attempts = 0;

                while (options.length < 5 && attempts < 200) {
                    attempts++;
                    let color = randomHex();
                    if (!options.includes(color)) options.push(color);

                }
                return shuffle(options);
            }

            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = randInt(0, i);
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function updateRoundDots() {
                const top = document.getElementById("roundDots");
                top.innerHTML = '';

                for (let i = 0; i < TOTAL_ROUNDS; i++) {
                    const d = document.createElement("div")
                    d.className = "round-dot";
                    if (i < round) {
                        d.classList.add(corrects[i] ? 'done-correct' : 'done-wrong');
                    } else if (i === round) {
                        d.classList.add('current');
                    }
                    top.appendChild(d);
                }
            }

            function updateProgress() {
                let yuzde = (round / TOTAL_ROUNDS) * 100;
                document.getElementById('progressFill').style.width = yuzde + '%';
                document.getElementById('roundLabel').textContent = `Round ${round + 1} of ${TOTAL_ROUNDS}`;
                const corr = corrects.filter(Boolean).length;
                const acc = round > 0 ? Math.round((corr / round) * 100) : '—';
                document.getElementById("accuracyLabel").textContent = `Accuracy ${round > 0 ? acc + '%' : '—'}`;
            }

            function setScore(S) {
                score = S;
                document.getElementById("scoreNum").textContent = score;
            }

            function setStreak(S) {
                streak = S;
                if (streak > bestStreak) {
                    bestStreak = streak;
                }
                document.getElementById("streakNum").textContent = streak;
            }

            function renderRound() {
                if (round >= TOTAL_ROUNDS) {
                    showGameOver();
                    return;
                }
                answered = false;
                correctHex = randomHex();

                const swatch = document.getElementById('swatch');
                swatch.style.background = correctHex;
                swatch.classList.remove('pop');
                void swatch.offsetWidth;
                swatch.classList.add('pop');

                const options = generateOptions(correctHex);
                const grid = document.getElementById('optionsGrid');
                grid.innerHTML = '';
                options.forEach(hex => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = `
        <div class="option-dot" style="background:${hex}"></div>
        <div class="option-hex">${hex}</div>
      `;
                    btn.addEventListener('mouseenter', () => setHover(true));
                    btn.addEventListener('mouseleave', () => setHover(false));
                    btn.addEventListener('click', (e) => handleAnswer(e, btn, hex));
                    grid.appendChild(btn);
                });

                document.getElementById('feedbackTitle').textContent = '';
                document.getElementById('feedbackSub').textContent = '';
                document.getElementById('nextBtn').classList.remove('visible');

                updateProgress();
                updateRoundDots();
            }

            function handleAnswer(e, btn, chosen) {
                if (answered) return;
                answered = true;

                // ripple
                const rect = btn.getBoundingClientRect();
                const rEl = document.createElement('div');
                rEl.className = 'ripple';
                const size = Math.max(rect.width, rect.height);
                rEl.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
                btn.appendChild(rEl);
                setTimeout(() => rEl.remove(), 500);

                // disable all
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

                const isCorrect = chosen === correctHex;
                corrects.push(isCorrect);

                if (isCorrect) {
                    btn.classList.add('correct');
                    const pts = POINTS.easy + (streak * 20);
                    setScore(score + pts);
                    setStreak(streak + 1);
                    document.getElementById('feedbackTitle').textContent = pickCorrectPhrase();
                    document.getElementById('feedbackTitle').className = 'feedback-title good';
                    document.getElementById('feedbackSub').textContent = `+${pts} pts${streak > 1 ? ' · ' + streak + '× streak bonus' : ''}`;
                } else {
                    btn.classList.add('wrong');
                    setStreak(0);
                    // reveal correct
                    document.querySelectorAll('.option-btn').forEach(b => {
                        if (b.querySelector('.option-hex').textContent.trim() === correctHex) {
                            b.classList.add('reveal');
                        }
                    });
                    document.getElementById('feedbackTitle').textContent = pickWrongPhrase();
                    document.getElementById('feedbackTitle').className = 'feedback-title bad';
                    document.getElementById('feedbackSub').textContent = `The answer was ${correctHex}`;
                }

                round++;
                document.getElementById('nextBtn').classList.add('visible');
                updateRoundDots();
            }

            function pickCorrectPhrase() {
                const p = ['Exquisite.', 'Magnificent.', 'Parfait.', 'Brilliant.', 'Splendid.', 'Impeccable.', 'Correct'];
                return p[randInt(0, p.length - 1)];
            }

            function pickWrongPhrase() {
                const p = ['Not quite.', 'So close.', 'Almost.', 'Not this time.', 'Keep trying.', 'Incorrect'];
                return p[randInt(0, p.length - 1)];
            }

            function showGameOver() {
                document.getElementById('gameArea').style.display = 'none';
                const go = document.getElementById('gameOver');
                go.classList.add('show');

                const correct = corrects.filter(Boolean).length;
                const pct = Math.round((correct / TOTAL_ROUNDS) * 100);

                document.getElementById('goScore').textContent = score;
                document.getElementById('goCorrect').textContent = `${correct}/${TOTAL_ROUNDS}`;
                document.getElementById('goBest').textContent = bestStreak;

                let title, grade;
                if (pct === 100) {
                    title = 'Flawless<br><span>mastery.</span>';
                    grade = '"A perfect eye for colour. You see what others miss."';
                } else if (pct >= 80) {
                    title = 'Well<br><span>played.</span>';
                    grade = '"An exceptional sense of colour, the art world awaits."';
                } else if (pct >= 60) {
                    title = 'Not<br><span>bad.</span>';
                    grade = '"Your colour intuition is developing. Practice makes perfect."';
                } else if (pct >= 40) {
                    title = 'Keep<br><span>trying.</span>';
                    grade = '"The spectrum eludes you still, but every artist starts somewhere."';
                } else {
                    title = 'Colour<br><span>blind?</span>';
                    grade = '"Perhaps painting is not your calling. Perhaps..."';
                }

                document.getElementById('goTitle').innerHTML = title;
                document.getElementById('goGrade').textContent = grade;

                [document.getElementById('playAgain')].forEach(el => {
                    el.addEventListener('mouseenter', () => setHover(true));
                    el.addEventListener('mouseleave', () => setHover(false));
                });
            }

            document.getElementById('nextBtn').addEventListener('click', () => {
                document.getElementById('nextBtn').classList.remove('visible');
                renderRound();
            });
            document.getElementById('nextBtn').addEventListener('mouseenter', () => setHover(true));
            document.getElementById('nextBtn').addEventListener('mouseleave', () => setHover(false));

            document.getElementById("playAgain1").addEventListener("click", async () => {
                try {
                    // Send score & streak
                    await fetch("/hex1", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded"
                        },
                        body: `score=${score}&streak=${bestStreak}&game=hex`
                    });

                    round = 0;
                    score = 0;
                    streak = 0;
                    bestStreak = 0;
                    corrects = [];
                    setScore(0);
                    setStreak(0);
                    document.getElementById('gameOver').classList.remove('show');
                    document.getElementById('gameArea').style.display = 'flex';
                    document.getElementById('gameArea').style.flexDirection = 'column';
                    document.getElementById('gameArea').style.alignItems = 'center';
                    document.getElementById('gameArea').style.gap = '48px';
                    renderRound();
                } catch (err) {
                    console.error("Failed to submit score", err);
                }
            });

            document.getElementById('playAgain').addEventListener('click', () => {
                round = 0;
                score = 0;
                streak = 0;
                bestStreak = 0;
                corrects = [];
                setScore(0);
                setStreak(0);
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('gameArea').style.display = 'flex';
                document.getElementById('gameArea').style.flexDirection = 'column';
                document.getElementById('gameArea').style.alignItems = 'center';
                document.getElementById('gameArea').style.gap = '48px';
                renderRound();
            });


            renderRound();
        </script>
    </body>

</html>
